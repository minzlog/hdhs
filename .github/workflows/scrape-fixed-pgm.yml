name: 고정PGM 편성 수집

on:
  schedule:
    # 매일 한국시간(KST) 04:30 = UTC 19:30(전날). 편성표(05:00)와 겹치지 않도록
    # 30분 앞선 가벼운 시간대에 단독으로 실행한다.
    - cron: "30 19 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼

permissions:
  contents: write
  actions: write   # pages-deploy 워크플로우를 API로 dispatch하려면 필요

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 고정PGM 스크래퍼 실행 - 현대(HD)
        continue-on-error: true
        run: python fixed/hd_fixed_programs.py

      - name: 고정PGM 스크래퍼 실행 - GS
        continue-on-error: true
        run: python fixed/gs_fixed_programs.py

      - name: 고정PGM 스크래퍼 실행 - CJ온스타일(CJ)
        continue-on-error: true
        run: python fixed/cj_fixed_programs.py

      - name: 고정PGM 스크래퍼 실행 - 롯데(LT)
        continue-on-error: true
        run: python fixed/lt_fixed_programs.py

      - name: 고정PGM 데이터 병합
        continue-on-error: true
        run: python fixed/build_fixed_pgm.py

      - name: 변경사항 커밋
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homeshopping/fixed_programs/*.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: 고정PGM 편성 데이터 갱신 ($(date -u +%Y-%m-%d))"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push 실패, 재시도 ($i)"
            sleep $((RANDOM % 10 + 1))
          done

      - name: Pages 재배포 트리거
        # github-actions[bot] 계정(GITHUB_TOKEN)으로 만든 push는 GitHub이
        # 다른 워크플로우를 재귀적으로 트리거하지 않아, 위에서 데이터를
        # 새로 커밋해도 pages-deploy.yml이 자동으로 반응하지 않을 수 있다.
        # workflow_dispatch를 API로 직접 호출해 배포를 강제로 큐에 넣는다.
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages-deploy.yml/dispatches" \
            -d '{"ref":"main"}'
