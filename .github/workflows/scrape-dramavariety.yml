name: 드라마예능 편성 수집

on:
  schedule:
    # 하루 3회 수집: KST 02:00(=UTC 17:00 전날), KST 07:00(=UTC 22:00 전날), KST 12:10(=UTC 03:10)
    - cron: "0 17 * * *"
    - cron: "0 22 * * *"
    - cron: "10 3 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install playwright beautifulsoup4 lxml
          python -m playwright install --with-deps chromium

      - name: 스크래핑 실행
        run: |
          cd scraper
          python scrape_naver.py --out-dir ../data/dramavariety --max-pages 30

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dramavariety/*.json
          git diff --cached --quiet || git commit -m "chore: 드라마/예능 편성 데이터 갱신 ($(date -u +%Y-%m-%d))"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push 실패, 재시도 ($i)"
            sleep $((RANDOM % 10 + 1))
          done
