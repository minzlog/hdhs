name: 홈쇼핑 편성 수집 (HD/LT/CJ/GS)

on:
  schedule:
    # 하루 2회: KST 05:50 = UTC 20:50 (전날), KST 12:20 = UTC 03:20
    - cron: "50 20 * * *"
    - cron: "20 3 * * *"
  workflow_dispatch: {}  # 수동 실행 버튼

permissions:
  contents: write
  actions: write   # pages-deploy 워크플로우를 API로 dispatch하려면 필요

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 scikit-learn joblib pandas openpyxl

      - name: 홈쇼핑 스크래퍼 실행 - 현대(HD)
        continue-on-error: true
        run: python hd_scraper.py

      - name: 홈쇼핑 스크래퍼 실행 - 롯데(LT)
        continue-on-error: true
        run: python lt_scraper.py

      - name: 홈쇼핑 스크래퍼 실행 - CJ온스타일(CJ)
        continue-on-error: true
        run: python cj_scraper.py

      - name: 홈쇼핑 스크래퍼 실행 - GS(라방바 경유)
        continue-on-error: true
        run: python gs_scraper.py

      - name: 결과 커밋 & 푸시
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 위 스크래퍼 스텝들은 continue-on-error: true라서 전부 실패해도 여기까지 온다.
          # 그 경우 디렉토리 자체가 안 만들어져 git add -A -- {경로}가
          # "did not match any files"로 fatal 종료할 수 있으므로, mkdir -p로
          # 대상 디렉토리 존재를 먼저 보장한다 (빈 디렉토리는 git add -A가 안전하게 무시).
          mkdir -p homeshopping/HD_live homeshopping/HD_data \
                   homeshopping/LT_live homeshopping/LT_data \
                   homeshopping/CJ_live homeshopping/CJ_data \
                   homeshopping/GS_live homeshopping/GS_data
          git add -A -- \
                  homeshopping/HD_live homeshopping/HD_data \
                  homeshopping/LT_live homeshopping/LT_data \
                  homeshopping/CJ_live homeshopping/CJ_data \
                  homeshopping/GS_live homeshopping/GS_data
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: 홈쇼핑 편성 자동 갱신 $(date -u +%Y-%m-%d)"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          git pull --rebase --autostash origin main
          git push

      - name: Pages 재배포 트리거
        # github-actions[bot] 계정(GITHUB_TOKEN)으로 만든 push는 GitHub이
        # 다른 워크플로우를 재귀적으로 트리거하지 않아, 위에서 데이터를
        # 새로 커밋해도 pages-deploy.yml이 자동으로 반응하지 않을 수 있다.
        # workflow_dispatch를 API로 직접 호출해 배포를 강제로 큐에 넣는다.
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/pages-deploy.yml/dispatches" \
            -d '{"ref":"main"}'
